<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Grass Blade — a cozy arcade harvesting game about building enough momentum to cut through a living meadow."
    />
    <meta name="theme-color" content="#67c84a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Grass Blade" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="/pwa-icon.svg" />
    <link rel="apple-touch-icon" href="/pwa-icon-180.png" />
    <title>Grass Blade</title>
  </head>
  <body>
    <main id="app">
      <canvas id="game-canvas" aria-label="Grass Blade meadow" tabindex="0"></canvas>
      <div id="touch-stick" class="touch-stick" aria-hidden="true" hidden>
        <span id="touch-stick-knob" class="touch-stick__knob"></span>
      </div>
      <div
        id="accessibility-status"
        class="sr-only"
        role="status"
        aria-live="polite"
        aria-atomic="true"
      ></div>
      <section id="game-hud" class="game-hud" aria-label="Meadow Delivery status">
        <div id="hud-time-dial" class="time-dial" aria-label="Elapsed time">
          <span id="hud-time-label" class="time-dial__label">TIME</span>
          <strong id="hud-time">0:00</strong>
          <span class="time-dial__stats">
            <b id="hud-level">LV 1</b>
            <span id="hud-rpm">720 RPM</span>
          </span>
        </div>

        <div class="objective-tray" aria-live="polite">
          <p id="hud-contract-title" class="objective-tray__title">MEADOW DELIVERY</p>
          <div id="hud-row-grass" class="objective-row">
            <span class="resource-icon resource-icon--grass" aria-hidden="true">
              <i></i><i></i><i></i>
            </span>
            <span class="objective-row__name">Grass</span>
            <strong><span id="hud-grass">0</span>/<span id="hud-grass-target">50</span></strong>
          </div>
          <div id="hud-row-flower" class="objective-row">
            <span class="resource-icon resource-icon--flower" aria-hidden="true">
              <i></i><i></i><i></i><i></i><i></i>
            </span>
            <span class="objective-row__name">Flowers</span>
            <strong><span id="hud-flowers">0</span>/<span id="hud-flowers-target">10</span></strong>
          </div>
          <div id="hud-row-fiber" class="objective-row">
            <span class="resource-icon resource-icon--fiber" aria-hidden="true">
              <i></i><i></i><i></i>
            </span>
            <span class="objective-row__name">Fiber</span>
            <strong><span id="hud-fiber">0</span>/<span id="hud-fiber-target">6</span></strong>
          </div>
          <div id="hud-row-wood" class="objective-row">
            <span class="resource-icon resource-icon--wood" aria-hidden="true">
              <i></i><i></i>
            </span>
            <span class="objective-row__name">Wood</span>
            <strong><span id="hud-wood">0</span>/<span id="hud-wood-target">6</span></strong>
          </div>
          <div class="xp-track" aria-label="Blade experience">
            <span id="hud-xp-fill"></span>
          </div>
        </div>
      </section>

      <button
        id="pause-toggle"
        class="pause-toggle"
        type="button"
        aria-label="Pause contract"
        hidden
      >
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
      </button>

      <div id="level-toast" class="level-toast" role="status" aria-live="polite" aria-atomic="true">
        <span class="level-toast__ring" aria-hidden="true"></span>
        <span class="level-toast__label">LEVEL <strong id="level-toast-number">1</strong></span>
      </div>

      <p class="controls-hint">
        Drag to move <span>·</span> WASD / arrows <span>·</span> F fullscreen
      </p>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
